{% extends 'base/base.html' %}
{% block title %}Issue Delete{% endblock %}
{% block page_title %}{% endblock %}
{% block content %}

<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-danger text-white">
            Delete Issue 
        </div>
        <div class="card-body">
            <p>
                Are you sure you want to delete this Issue?
            </p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    Yes, Delete
                </button>
                <a href="{% url 'PPE:IssueManagement_list' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
