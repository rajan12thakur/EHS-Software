{% extends 'base/base.html' %}

{% block title %}Delete PPE Item{% endblock %}
{% block page_title %}Delete PPE Item{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-6">

        <div class="card border-danger shadow">

            <div class="card-header bg-danger text-white">
                <h4>
                    <i class="fas fa-trash"></i>
                    Delete PPE Item
                </h4>
            </div>

            <div class="card-body text-center">

                <h5 class="mb-4">
                    Are you sure you want to delete this PPE item?
                </h5>

                <div class="alert alert-warning">
                    <strong>{{ ppe.name }}</strong>
                </div>

                <p class="text-muted">
                    PPE Code: <b>{{ ppe.ppe_code }}</b>
                </p>

                <form method="post">
                    {% csrf_token %}

                    <a href="{% url 'PPE:master_list' %}"
                       class="btn btn-secondary">
                        Cancel
                    </a>

                    <button type="submit"
                            class="btn btn-danger">
                        <i class="fas fa-trash"></i>
                        Yes, Delete
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
